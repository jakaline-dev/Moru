seed: 42
name: # Name of the training LoRA
type: LoRA
base:
  checkpoint_path: # Your base checkpoint
  type: SD1
  clip_skip: 2

trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  # bf16-mixed: mixed precision training (bf16 <> fp32)
  # bf16-true: full bf16 training
  # Only use those two options
  # If your GPU is not above NVIDIA Ampere, cry or get a runpod instance
  precision: bf16-true
  batch_size: 1
  grad_accum_steps: 1
  # Pytorch 2.1 default attention is faster than xformers in windows (Could change with implementation of Flash Attention 2)
  use_xformers: false
  max_train:
    method: "epoch"
    value: 10
  save_every:
    method: "epoch"
    value: 0
  sample_every:
    method: "epoch"
    value: 0
    num_images: 0 # WIP

model:
  type: ${base.type}_${type}
  clip_skip: ${base.clip_skip}
  noise_offset: 0.05
  snr_gamma: 5
  lora_unet:
    enable_train: true
    rank: 16
    network_alpha: 8
    optimizer:
      # AdamW8bit: bitsandbytes optimizer is supported, but is not that useful for LoRA training in SD1
      name: AdamW
      init_args:
        lr: 0.0005
    lr_scheduler:
      name: cosine_with_restarts
      init_args:
        num_cycles: 3
        num_warmup_steps: 100
  lora_te:
    enable_train: true
    rank: 16
    network_alpha: 8
    optimizer:
      name: AdamW
      init_args:
        lr: 0.00005
    lr_scheduler:
      name: cosine_with_restarts
      init_args:
        num_cycles: 3
        num_warmup_steps: 100

preprocess:
  folder_path: # Your dataset folder path, which contains training images and captions(.txt) file with the same filename as the image.
  parameters:
    max_chunk: 96 # 1 chunk = 64 x 64, 64 chunk = 512 x 512, 256 chunk = 1024 x 1024
    min_chunk: 32
  cache_vae_outputs: false
  cache_te_outputs: false # WIP

bucket:
  enable: true

dataset:
  random_crop: true
  random_flip: true
  shuffle_tags: false # WIP

dataloader:
  batch_size: ${trainer.batch_size}
  drop_last: false
  pin_memory: true
  num_workers: 1
  persistent_workers: true
