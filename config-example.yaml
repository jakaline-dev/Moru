seed: 42
base:
  checkpoint_path: # Your base checkpoint.
  type: SD1
  clip_skip: 2

trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  precision: bf16-true
  batch_size: 1
  grad_accum_steps: 1
  use_xformers: false
  name: # Name of the training LoRA
  max_train:
    method: "epoch"
    value: 10
  save_every:
    method: "epoch"
    value: 1
  sample_every:
    method: "epoch"
    value: 0
    num_images: 0

model:
  type: SD1LoRA
  clip_skip: ${base.clip_skip}
  noise_offset: 0.05
  snr_gamma: 5
  lora_unet:
    enable_train: true
    rank: 16
    network_alpha: 8
    optimizer:
      name: AdamW
      init_args:
        lr: 0.0005
    lr_scheduler:
      name: cosine_with_restarts
      init_args:
        num_cycles: 3
        num_warmup_steps: 100
  lora_te:
    enable_train: true
    rank: 16
    network_alpha: 8
    optimizer:
      name: AdamW
      init_args:
        lr: 0.00005
    lr_scheduler:
      name: cosine_with_restarts
      init_args:
        num_cycles: 3
        num_warmup_steps: 100

preprocess:
  folder_path: #Your dataset. A folder with images and captions(.txt) file.
  parameters:
    # 1 chunk = 64 x 64 pixels, 64 chunk = 512 x 512 pixels, 256 chunk = 1024 x 1024 pixels
    # If images are smaller than min_chunk, remove it from dataset
    # If images are bigger than max_chunk, resize them until it fits.
    max_chunk: 96
    min_chunk: 32

dataset:
  type: batch1
  parameters:
    force_upscale: false
    random_crop: true
    random_flip: true
    shuffle_tags: false
    cache_latents: false
    cache_text_embeddings: false

dataloader:
  batch_size: ${trainer.batch_size}
  pin_memory: true
  num_workers: 1
  persistent_workers: true
